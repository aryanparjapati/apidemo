<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8" />
    <title>Login Page</title>
</head>

<body>
<section class="auth-section">

    <div class="auth-card">

        <!-- Logo -->
        <div class="text-center mb-3">
            <img src="/img/images.png" class="logo">
            <h2>Welcome Back</h2>
            <p class="text-light">Login to your account</p>
        </div>

        <form th:action="@{/dologin}" method="post">

            <!-- ERROR -->
            <div th:if="${param.error}" class="alert alert-danger text-center">
                Invalid username or password
            </div>

            <!-- LOGOUT -->
            <div th:if="${param.logout}" class="alert alert-success text-center">
                You have been logged out
            </div>

            <!-- EMAIL -->
            <input type="email" name="username"
                   class="input-field"
                   placeholder="Enter email" required>

            <!-- PASSWORD -->
            <div class="password-box">
                <input type="password" name="password"
                       id="password"
                       class="input-field"
                       placeholder="Enter password" required>

                <span onclick="togglePassword()" class="eye">👁️</span>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="login-btn">Login</button>

        </form>

        <!-- SIGNUP -->
        <div class="switch">
            Don't have an account?
            <a th:href="@{/signup}">Register</a>
        </div>

    </div>

</section>

<!-- JS for show/hide password -->
<script>
    function togglePassword() {
        const pass = document.getElementById("password");
        pass.type = pass.type === "password" ? "text" : "password";
    }
</script>

</body>
</html>
