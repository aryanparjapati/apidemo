<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{normal/Base::layout(~{::section})}">
<head>
<meta charset="UTF-8" />
<title>Show Contact</title>
</head>
<body>
<section>

	<div class="card mr-3 ml-3">

		<div class="card-body">

			<h1 class="text-center">Your Contacts</h1>

			<!-- SEARCH -->
			<div class="search-container my-3">

				<input onkeyup="search()" id="search-input"
					type="text"
					class="form-control"
					placeholder="Search Your Contact" />

				<div class="search-result mt-2"
					style="display:none;">
					<!-- JS results will come here -->
				</div>

			</div>

			<!-- TABLE -->
			<div class="table-responsive">
				<table class="table table-hover">

					<thead class="thead-light">
						<tr>
							<th>#ID</th>
							<th>Name</th>
							<th>Email</th>
							<th>Phone</th>
							<th>Action</th>
						</tr>
					</thead>

					<tbody>

						<tr th:each="c : ${contacts.content}">

							<!-- ID -->
							<th th:text="${'SCM-USER-' + c.cId}"></th>

							<!-- NAME + IMAGE -->
							<td>
								<img th:if="${c.image != null}"
									th:src="@{'/img/' + ${c.image}}"
									class="my_profie_picture"
									style="height:40px;width:40px;border-radius:50%;" />

								<span th:text="${c.name}"></span>
							</td>

							<!-- EMAIL -->
							<td>
								<a th:href="@{'/user/' + ${c.cId} + '/contact'}">
									<span th:text="${c.email}"></span>
								</a>
							</td>

							<!-- PHONE -->
							<td th:text="${c.phone}"></td>

							<!-- ACTION -->
							<td>

								<!-- DELETE -->
								<a href="#"
								   th:onclick="|deleteContact(${c.cId})|"
								   class="btn btn-danger btn-sm">
									Delete
								</a>

								<!-- UPDATE (FIXED) -->
								<a th:href="@{'/user/update-contact/' + ${c.cId}}"
								   class="btn btn-primary btn-sm mt-1">
									Update
								</a>

							</td>

						</tr>

					</tbody>

				</table>
			</div>

			<!-- PAGINATION -->
			<nav aria-label="Page navigation">

				<ul class="pagination">

					<li th:if="${currentPage > 0}" class="page-item">
						<a th:href="@{'/user/show-contacts/' + ${currentPage - 1}}"
						   class="page-link">Previous</a>
					</li>

					<li th:each="i : ${#numbers.sequence(1, totalPages)}"
						th:classappend="${currentPage == i-1 ? 'active' : ''}"
						class="page-item">

						<a th:href="@{'/user/show-contacts/' + ${i - 1}}"
						   class="page-link"
						   th:text="${i}"></a>

					</li>

					<li th:if="${currentPage + 1 < totalPages}"
						class="page-item">

						<a th:href="@{'/user/show-contacts/' + ${currentPage + 1}}"
						   class="page-link">Next</a>

					</li>

				</ul>

			</nav>

		</div>

	</div>

</section>
</body>
</html>
