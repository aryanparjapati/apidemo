<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8" />
    <title>Signup Page</title>

    <!-- External CSS link -->
    <link rel="stylesheet" th:href="@{/css/signup.css}">
</head>

<body>

<section class="auth-section">

    <div class="auth-card">

        <div class="text-center mb-3">
            <img th:src="@{/img/images.png}" class="logo" alt="logo">
            <h2>Create Account</h2>
            <p>Join Smart Contact Manager</p>
        </div>

        <!-- Message -->
        <div th:if="${session.message}"
             th:classappend="${session.message.type}"
             class="alert text-center">
            <span th:text="${session.message.content}"></span>
            <th:block th:text="${#session.removeAttribute('message')}"></th:block>
        </div>

        <!-- Form -->
        <form th:action="@{/do_register}" method="post" th:object="${user}">

            <input type="text" th:field="*{name}" class="form-control mb-2"
                   placeholder="Full Name" required>

            <input type="email" th:field="*{email}" class="form-control mb-2"
                   placeholder="Email Address" required>

            <input type="password" th:field="*{password}" class="form-control mb-2"
                   placeholder="Password" required>

            <textarea th:field="*{about}" class="form-control mb-2"
                      rows="3" placeholder="Tell us about yourself..."></textarea>

            <div class="form-check text-center mb-3">
                <input type="checkbox" name="agreement" class="form-check-input" id="agreement">
                <label for="agreement">Accept terms & conditions</label>
            </div>

            <button type="submit" class="btn-primary w-100 mb-2">Create Account</button>
            <button type="reset" class="btn-warning w-100">Reset</button>

        </form>

        <div class="text-center mt-3">
            Already have an account?
            <a th:href="@{/signin}">Login</a>
        </div>

    </div>

</section>

</body>
</html>
